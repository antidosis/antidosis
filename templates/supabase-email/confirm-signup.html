<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Confirm your Antidosis account</title>
  </head>
  <body
    style="
      margin: 0;
      padding: 0;
      background-color: #0a0806;
      font-family:
        &quot;Inter&quot;,
        system-ui,
        -apple-system,
        sans-serif;
    "
  >
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
      <tr>
        <td align="center" style="padding: 48px 16px">
          <table
            role="presentation"
            width="100%"
            max-width="520"
            cellspacing="0"
            cellpadding="0"
            border="0"
            style="max-width: 520px; width: 100%"
          >
            <!-- Logo -->
            <tr>
              <td align="center" style="padding-bottom: 40px">
                <img
                  src="{{ .SiteURL }}/images/logo.png"
                  alt="Antidosis"
                  width="160"
                  style="display: block; width: 160px; height: auto; opacity: 0.9"
                />
              </td>
            </tr>
            <!-- Card -->
            <tr>
              <td
                style="
                  background-color: #12100e;
                  border: 1px solid #2a2420;
                  padding: 40px 32px;
                  border-radius: 0;
                "
              >
                <!-- Heading -->
                <h1
                  style="
                    margin: 0 0 16px 0;
                    font-size: 22px;
                    font-weight: 700;
                    color: #e8d5a3;
                    letter-spacing: -0.01em;
                  "
                >
                  Welcome to Antidosis
                </h1>
                <p style="margin: 0 0 32px 0; font-size: 15px; line-height: 1.6; color: #b8a078">
                  Thanks for signing up. Confirm your email address to start exchanging.
                </p>
                <!-- CTA -->
                <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
                  <tr>
                    <td align="center" style="padding-bottom: 32px">
                      <a
                        href="{{ .ConfirmationURL }}"
                        style="
                          display: inline-block;
                          padding: 14px 32px;
                          background-color: #f5a623;
                          color: #0a0806;
                          text-decoration: none;
                          font-size: 14px;
                          font-weight: 600;
                          text-transform: lowercase;
                          letter-spacing: 0.02em;
                          border-radius: 0;
                        "
                      >
                        confirm email address
                      </a>
                    </td>
                  </tr>
                </table>
                <!-- Fallback link -->
                <p style="margin: 0 0 8px 0; font-size: 12px; color: #7a6b5a">
                  Or paste this link into your browser:
                </p>
                <p
                  style="
                    margin: 0;
                    word-break: break-all;
                    font-size: 12px;
                    color: #7a6b5a;
                    font-family: &quot;JetBrains Mono&quot;, monospace;
                  "
                >
                  <a href="{{ .ConfirmationURL }}" style="color: #f5a623; text-decoration: none"
                    >{{ .ConfirmationURL }}</a
                  >
                </p>
              </td>
            </tr>
            <!-- Footer -->
            <tr>
              <td align="center" style="padding-top: 32px">
                <p style="margin: 0 0 8px 0; font-size: 12px; color: #7a6b5a">
                  If you didn't create an account, you can safely ignore this email.
                </p>
                <p style="margin: 0; font-size: 12px; color: #7a6b5a">
                  Antidosis — A marketplace for reciprocal exchange
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
